name: cathy_book_scanner
description: Buch Scanner App mit OCR und TTS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  sqflite: ^2.3.0

  # Camera & Image
  image_picker: ^1.0.5
  camera: ^0.10.5+5
  image: ^4.1.3

  # HTTP & API
  http: ^1.1.2
  dio: ^5.4.0

  # File Handling
  file_picker: ^6.1.1
  pdf: ^3.10.7
  printing: ^5.11.1

  # Audio
  audioplayers: ^5.2.1
  record: ^5.0.4
  permission_handler: ^11.1.0

  # Utils
  uuid: ^4.2.2
  intl: ^0.19.0
  flutter_slidable: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
